name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: macos-26
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Validate scripts and release metadata
        run: |
          bash -n scripts/*.sh
          ruby -c Formula/apple-calendar-mcp-server.rb
          PYTHONDONTWRITEBYTECODE=1 python3 -m py_compile scripts/*.py
          python3 scripts/check_release_consistency.py

      - name: Test
        run: swift test

      - name: Build release binary and app bundles
        env:
          CODESIGN_IDENTITY: "-"
          ACP_CODESIGN_IDENTITY: "-"
        run: |
          swift build -c release
          ./scripts/build_app_bundle.sh release
          ./scripts/build_mac_app.sh release

      - name: Smoke test MCP server
        run: python3 scripts/smoke_mcp.py --binary .build/arm64-apple-macosx/release/AppleCalendarMCPServer

      - name: Verify signatures and property lists
        run: |
          codesign --verify --deep --strict .build/arm64-apple-macosx/release/AppleCalendarMCPServer.app
          codesign --verify --deep --strict .build/arm64-apple-macosx/release/ACP.app
          plutil -lint .build/arm64-apple-macosx/release/AppleCalendarMCPServer.app/Contents/Info.plist
          plutil -lint .build/arm64-apple-macosx/release/ACP.app/Contents/Info.plist
